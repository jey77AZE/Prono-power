<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PronoPower</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:#0d1525}
  ::-webkit-scrollbar-thumb{background:#00e676;border-radius:2px}
  body{min-height:100vh;background:#060b14;font-family:'Bebas Neue','Impact',sans-serif;color:#e8eaf0;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(#ffffff05 1px,transparent 1px),linear-gradient(90deg,#ffffff05 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,#00e67610 0%,transparent 70%);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 16px 80px}
  .header{text-align:center;margin-bottom:32px}
  .badge{font-size:11px;letter-spacing:8px;color:#00e676;font-family:'Barlow',sans-serif;font-weight:600;margin-bottom:8px}
  h1{font-size:clamp(48px,10vw,80px);letter-spacing:4px;line-height:1;color:#fff}
  h1 span{color:#00e676}
  .sub{font-family:'Barlow',sans-serif;font-size:14px;color:#6b7a9a;margin-top:8px;font-weight:300}
  .tabs{display:flex;gap:4px;margin-bottom:28px;background:#0d1525;border-radius:12px;padding:4px}
  .tab{flex:1;padding:10px 16px;border-radius:9px;border:none;cursor:pointer;background:transparent;color:#6b7a9a;font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;border-bottom:2px solid transparent;transition:all .2s}
  .tab.active{background:#162235;color:#00e676;border-bottom-color:#00e676}
  .tab:hover:not(.active){background:#1a2740}
  .section{display:none}.section.show{display:block;animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes glow{0%,100%{box-shadow:0 0 20px #00e67630}50%{box-shadow:0 0 50px #00e67670}}
  @keyframes barIn{from{width:0}to{width:var(--w)}}
  .label{font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:3px;color:#6b7a9a;margin-bottom:10px}
  .leagues{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:24px;scrollbar-width:thin;scrollbar-color:#00e676 #0d1525}
  .chip{padding:7px 14px;border:1px solid #1e2e45;border-radius:20px;background:transparent;color:#8a9ab5;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;flex-shrink:0}
  .chip:hover{border-color:#00e676;color:#00e676;transform:translateY(-2px)}
  .chip.active{border-color:#00e676;background:#00e67615;color:#00e676}
  .teams-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:24px}
  .team-block label{display:block;font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:3px;color:#6b7a9a;margin-bottom:8px}
  select{width:100%;padding:14px 18px;background:#0d1525;border:1px solid #1e2e45;border-radius:10px;color:#e8eaf0;font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;cursor:pointer;-webkit-appearance:none;outline:none}
  select:focus{border-color:#00e67660}
  .vs-circle{font-size:22px;color:#00e676;font-family:'Bebas Neue';background:#0d1525;border:1px solid #00e67630;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;margin:0 auto}
  #genBtn{width:100%;padding:18px 32px;background:linear-gradient(135deg,#00e676,#00bcd4);border:none;border-radius:12px;color:#060b14;font-family:'Bebas Neue';font-size:22px;letter-spacing:4px;cursor:pointer;transition:all .25s;margin-bottom:28px;animation:glow 2s infinite}
  #genBtn:hover{transform:translateY(-3px);box-shadow:0 12px 40px #00e67650}
  #genBtn:active{transform:translateY(0)}
  #genBtn:disabled{background:#0d1525;border:1px solid #1e2e45;color:#6b7a9a;cursor:not-allowed;animation:none;transform:none;box-shadow:none}
  .loading-row{display:flex;align-items:center;justify-content:center;gap:12px}
  .spinner{width:18px;height:18px;border:2px solid #6b7a9a;border-top-color:#00e676;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
  .loading-txt{font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;color:#6b7a9a}
  #result{animation:fadeIn .5s ease}
  .live-badge{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#00e676;box-shadow:0 0 8px #00e676;flex-shrink:0}
  .live-txt{font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:3px;color:#00e676}
  .card{background:#0d1525;border-radius:16px;padding:24px;margin-bottom:14px}
  .card-sm{background:#0d1525;border-radius:12px;padding:16px;margin-bottom:14px}
  .verdict-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:24px}
  .verdict-result{font-size:clamp(24px,5vw,36px);letter-spacing:2px}
  .verdict-sub{font-family:'Barlow',sans-serif;font-size:13px;color:#8a9ab5;margin-top:4px}
  .confidence{font-size:48px;line-height:1}
  .conf-sub{font-family:'Barlow',sans-serif;font-size:12px;color:#6b7a9a;margin-top:2px;text-align:right}
  .prob-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .prob-label{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
  .prob-track{flex:1;height:8px;background:#162235;border-radius:4px;overflow:hidden}
  .prob-bar{height:100%;border-radius:4px;animation:barIn .8s ease forwards}
  .prob-pct{font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;width:40px;text-align:right;flex-shrink:0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .stat-card{background:#0d1525;border:1px solid #1e2e45;border-radius:12px;padding:16px 14px;text-align:center}
  .stat-val{font-size:clamp(16px,3.5vw,24px);color:#00e676;letter-spacing:1px;margin:6px 0 2px}
  .stat-sub{font-family:'Barlow',sans-serif;font-size:11px;color:#4a5a70}
  .forme-chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .forme-chip{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:14px;letter-spacing:1px}
  .W{background:#00e67620;border:1px solid #00e676;color:#00e676}
  .D{background:#ffb30020;border:1px solid #ffb300;color:#ffb300}
  .L{background:#ff408120;border:1px solid #ff4081;color:#ff4081}
  .injury-item{font-family:'Barlow',sans-serif;font-size:12px;color:#c0cce0;margin-bottom:4px;display:flex;gap:6px}
  .injury-x{color:#ff4081}
  .star-item{font-family:'Barlow',sans-serif;font-size:12px;color:#c0cce0;margin-bottom:4px;display:flex;gap:6px}
  .star-ico{color:#00e676}
  .none-txt{font-family:'Barlow',sans-serif;font-size:12px;color:#3a4a60}
  .analyse-txt{font-family:'Barlow',sans-serif;font-size:14px;color:#c0cce0;line-height:1.7;font-weight:300}
  .factor-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
  .factor-arrow{color:#00e676;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px}
  .factor-txt{font-family:'Barlow',sans-serif;font-size:13px;color:#c0cce0;line-height:1.5}
  .disclaimer{font-family:'Barlow',sans-serif;font-size:11px;color:#3a4a60;text-align:center;margin-top:16px;font-style:italic}
  .hist-card{background:#0a1220;border:1px solid #1e2e45;border-radius:12px;padding:16px 20px;margin-bottom:10px;transition:all .2s}
  .hist-card:hover{border-color:#00e67640;background:#0d1a2d}
  .hist-meta{font-family:'Barlow',sans-serif;font-size:12px;color:#6b7a9a;margin-bottom:4px}
  .hist-teams{font-size:20px;letter-spacing:2px}
  .hist-vs{color:#3a4a60}
  .hist-result{font-size:16px;letter-spacing:1px}
  .hist-score{font-family:'Barlow',sans-serif;font-size:13px;color:#8a9ab5;margin-top:2px}
  .hist-conf{font-family:'Barlow',sans-serif;font-size:12px}
  .empty{text-align:center;padding:80px 20px;color:#3a4a60}
  .empty-icon{font-size:48px;margin-bottom:16px}
  .empty p{font-family:'Barlow',sans-serif;font-size:16px}
  .team-info{font-family:'Barlow',sans-serif;font-size:11px;color:#6b7a9a;margin-bottom:6px}
  @media(max-width:480px){
    .grid2{grid-template-columns:1fr}
    .grid3{grid-template-columns:1fr 1fr}
    .teams-grid{grid-template-columns:1fr}
    .vs-circle{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="badge">⚡ AI POWERED</div>
    <h1>PRONO<span>POWER</span></h1>
    <p class="sub">Pronostics intelligents · Football mondial · 30+ compétitions</p>

  <div class="tabs">

  <div id="prono" class="section show">

        <label>🏠 DOMICILE</label>

      </div>
      <div class="vs-circle">VS</div>
      <div class="team-block">
        <label>✈ EXTÉRIEUR</label>
        <select id="awayTeam"></select>
      </div>
    </div>

    <button id="genBtn" onclick="generate()">⚡ GÉNÉRER LE PRONOSTIC</button>

    <div id="result" style="display:none"></div>
  </div>

  <div id="history" class="section">
    <div id="histList"></div>
  </div>
</div>

function getPenaltyRisk(home, away) {
  const aggressiveTeams = ["Atlético Madrid","Chelsea","Tottenham","Burnley","Lens","Nice","Galatasaray"];
  const penaltyMagnetTeams = ["Man City","Barcelona","Real Madrid","Liverpool","PSG","Inter Milan"];
  
  let risk = 30;
  if (aggressiveTeams.includes(home) || aggressiveTeams.includes(away)) risk += 20;
  if (penaltyMagnetTeams.includes(home) || penaltyMagnetTeams.includes(away)) risk += 15;
  risk = Math.min(85, Math.max(20, risk + rnd(-10, 10)));
  
  const htaker = PENALTY_TAKERS[home] || `Tireur attitré de ${home}`;
  const ataker = PENALTY_TAKERS[away] || `Tireur attitré de ${away}`;
  
  return {
    probabilite: risk,
    niveau: risk >= 65 ? "ÉLEVÉ" : risk >= 45 ? "MOYEN" : "FAIBLE",
    couleur: risk >= 65 ? "#ff4081" : risk >= 45 ? "#ffb300" : "#00e676",
    tireurHome: htaker,
    tireurAway: ataker,
  };
}

async function getLineups(homeId, awayId) {
  try {
    // Cherche les compositions officielles (disponibles ~1h avant le match)
    const [hLineup, aLineup] = await Promise.all([
      fetchAPI(`/football-get-team-squad?teamId=${homeId}`).catch(()=>null),
      fetchAPI(`/football-get-team-squad?teamId=${awayId}`).catch(()=>null),
    ]);
    
    const extractLineup = (data) => {
      const players = data?.response?.players || [];
      return players.slice(0, 11).map(p => `${p.name} (${p.position === 'Goalkeeper' ? 'GK' : p.position === 'Defender' ? 'DEF' : p.position === 'Midfielder' ? 'MIL' : 'ATT'})`);
    };
    
    return {
      home: extractLineup(hLineup),
      away: extractLineup(aLineup),
    };
  } catch(e) {
    return null;
  }
}

function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function pick(arr,n){
  const s=[...arr].sort(()=>Math.random()-.5);
  return s.slice(0,n);
}
function getRating(team){return TEAM_RATINGS[team]||68}
function getForm(team,seed){
  // Légèrement biaisé selon la force de l'équipe
  const r=getRating(team);
  const pool=[];
  const w=r>80?5:r>70?4:r>60?3:2;
  const l=r>80?1:r>70?2:r>60?3:4;
  for(let i=0;i<w;i++)pool.push("W");
  for(let i=0;i<l;i++)pool.push("L");
  for(let i=0;i<(7-w-l);i++)pool.push("D");
  return pick(pool,5);
}
function getInjuries(team){
  if(INJURY_POOL[team])return Math.random()>.4?pick(INJURY_POOL[team],rnd(0,INJURY_POOL[team].length)):[];
  // Générer des absences génériques réalistes
  const generics=[
    team+" #"+rnd(1,30)+" (MIL - cuisse)",
    "Défenseur central (blessure cheville)",
    "Milieu récupérateur (suspension 1 match)"
  ];
  return Math.random()>.5?pick(generics,rnd(0,2)):[];
}
function getKeyPlayers(team){
  if(KEY_PLAYERS[team])return KEY_PLAYERS[team];
  return[team+" n°9 (ATT - en forme)",team+" n°10 (MIL - 3 passes déc.)"];
}

function buildProno(home, away, leagueName){
  const rH = getRating(home);
  const rA = getRating(away);
  const diff=rH-rA;
  // Avantage domicile +5
  const adjH=rH+5;
  const adjA=rA;

  const neutralLeagueIds=["friendly_clubs","friendly_nations","euro_qual","wc_qual_am","wc_qual_af","copa_america","gold_cup","conmebol_lib","acl","cl","el"];
  const isNeutralVenue = neutralLeagueIds.includes(currentLeague?.id);
  const homeBonusDiff = isNeutralVenue ? diff : diff + 5; // Pas d'avantage domicile sur terrain neutre

  // Probabilités brutes
  let pH=35+homeBonusDiff*0.6, pN=28-Math.abs(diff)*0.2, pA=37-homeBonusDiff*0.6;
  // Normalisation
  const tot=pH+pN+pA;
  pH=Math.round(pH/tot*100);
  pA=Math.round(pA/tot*100);
  pN=100-pH-pA;
  if(pN<8){pN=8;const r2=pH+pA;pH=Math.round(pH/r2*92);pA=92-pH}

  // Résultat
  let resultat;
  const r=Math.random()*100;
  if(r<pH)resultat="Victoire domicile";
  else if(r<pH+pN)resultat="Match nul";
  else resultat="Victoire extérieur";

  // Score
  const avgGoals=2.3+((rH+rA)/2-70)*0.03;
  const goalsH=resultat==="Victoire domicile"?rnd(2,4):resultat==="Match nul"?rnd(1,2):rnd(0,1);
  const goalsA=resultat==="Victoire extérieur"?rnd(2,4):resultat==="Match nul"?goalsH:rnd(0,1);
  const score=`${goalsH}-${goalsA}`;
  const total=goalsH+goalsA;

  // Confiance
  const gap=Math.abs(diff);
  const confiance=Math.min(92,Math.max(42,52+gap*0.8+rnd(-5,5)));

  // Forme simulée selon le niveau de l'équipe
  const formeH = getForm(home);
  const formeA = getForm(away);
  const winsH=formeH.filter(x=>x==="W").length;
  const winsA=formeA.filter(x=>x==="W").length;

  // Blessés
  const blessesH=getInjuries(home);
  const blessesA=getInjuries(away);

  // Joueurs clés
  const joueursH=getKeyPlayers(home);
  const joueursA=getKeyPlayers(away);

  // H2H simulé
  const h2hResults=[];
  for(let i=0;i<3;i++){const s1=rnd(0,3),s2=rnd(0,3);h2hResults.push(`${home} ${s1}-${s2} ${away}`);}
  const h2hStr = "Confrontations récentes : "+h2hResults.join(" | ");

  // Analyse
  const forceHome=rH>80?"une des meilleures équipes de la compétition":rH>70?"une équipe solide":rH>60?"une formation correcte":"une équipe en difficulté";
  const forceAway=rA>80?"une des meilleures équipes de la compétition":rA>70?"une équipe solide":rA>60?"une formation correcte":"une équipe en difficulté";
  const formeHomeStr=winsH>=3?"excellente forme":"forme correcte";
  const formeAwayStr=winsA>=3?"excellente forme":"forme variable";
  const injuryNote=blessesH.length>0?` L'absence de ${blessesH[0].split(" (")[0]} pourrait peser.`:"";
  const analyse=`${home} est ${forceHome} en ${leagueName} avec une ${formeHomeStr} récente (${winsH}/5 victoires). ${away} affiche ${forceAway} et une ${formeAwayStr} (${winsA}/5 victoires). L'avantage du terrain est significatif dans cette confrontation.${injuryNote} ${resultat==="Victoire domicile"?`${home} devrait s'imposer grâce à sa supériorité technique et son public.`:resultat==="Victoire extérieur"?`${away} a les moyens de créer la surprise malgré le déplacement.`:`Un match équilibré qui pourrait se terminer sur un score de parité.`}`;

  const facteurs=[
    `${home} ${winsH>=3?"en grande forme":"en forme correcte"} : ${winsH} victoires sur les 5 derniers matchs`,
    `${away} ${winsA>=3?"performant":"régulier"} : ${winsA} succès récents · ${rA>80?"favori habituel":"outsider potentiel"}`,
    diff>0?`Supériorité technique de ${home} (écart de niveau : +${gap} pts)`:`${away} légèrement supérieur en termes de qualité d'effectif`,
    blessesH.length>0?`Absences importantes chez ${home} : ${blessesH.slice(0,2).map(x=>x.split(" (")[0]).join(", ")}`:blessesA.length>0?`${away} privé de ${blessesA[0].split(" (")[0]} pour ce match`:`Effectifs au complet des deux côtés`,
  ];

  // Buteurs potentiels
  const buteursH = getScorers(home);
  const buteursA = getScorers(away);

  // Compositions
  const lineupH = null;
  const lineupA = null;
  const formationH = FORMATIONS[home] || "4-3-3";
  const formationA = FORMATIONS[away] || "4-3-3";

  // Risque penalty
  const penaltyRisk = getPenaltyRisk(home, away);

  const neutralLeagues=["friendly_clubs","friendly_nations","euro_qual","wc_qual_am","wc_qual_af","copa_america","gold_cup","conmebol_lib","acl","cl","el"];
  const isNeutral = neutralLeagues.includes(currentLeague?.id);
  const venueNote = isNeutral
    ? "Terrain neutre · Pas d'avantage domicile · Match sur terrain tiers"
    : "Avantage domicile pris en compte · Stade de "+home;

  const risque=confiance>=75?"faible":confiance>=58?"moyen":"élevé";

  return{
    resultat,confiance,score,butsTotal:total,
    analyse,facteurs,
    probaDomicile:pH,probaNull:pN,probaExterieur:pA,
    overUnder:total>=3?"Over 2.5":"Under 2.5",
    btts:goalsH>0&&goalsA>0,
    formeHome:formeH,formeAway:formeA,
    blessesHome:blessesH,blessesAway:blessesA,
    joueursClesHome:joueursH,joueursClesAway:joueursA,
    buteursHome:buteursH, buteursAway:buteursA,
    lineupHome:lineupH, lineupAway:lineupA,
    formationHome:formationH, formationAway:formationA,
    penaltyRisk,
    h2h: h2hStr,
    meteo: venueNote,
    risque
  };
}

  const list=document.getElementById('histList');
  if(history.length===0){
    list.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>Aucun pronostic généré pour l'instant.</p><p style="font-size:13px;margin-top:8px">Lancez votre premier prono !</p></div>`;
    return;
  }
  list.innerHTML=history.map(h=>{
    const col=COLORS[h.prono.resultat]||'#00e676';
    const cc=h.prono.confiance>=75?'#00e676':h.prono.confiance>=55?'#ffb300':'#ff4081';
    return`<div class="hist-card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <div class="hist-meta">${h.flag} ${h.league} · ${h.date}</div>
          <div class="hist-teams">${h.home} <span class="hist-vs">vs</span> ${h.away}</div>
        </div>
        <div style="text-align:right">
          <div class="hist-result" style="color:${col}">${h.prono.resultat}</div>
          <div class="hist-score">Score prédit : <strong>${h.prono.score}</strong></div>
          <div class="hist-conf" style="color:${cc}">Confiance : ${h.prono.confiance}%</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Init
buildLeagueBar();
fillTeams();
</script>
</body>
</html>
